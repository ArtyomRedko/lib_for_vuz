<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход и регистрация — Библиотека КФУ</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="header-container"></div>

    <main class="main-content">
        <h1 style="text-align: center;">Доступ в библиотеку</h1>
        <div class="auth-container">
            <div class="auth-tabs">
                <button class="tab-btn active" data-form="login">Вход</button>
                <button class="tab-btn" data-form="register">Регистрация</button>
            </div>

            <div class="auth-form active-form" id="login-form">
                <form onsubmit="alert('Демо-режим: вход не выполнен. Бэкенд в разработке.'); return false;">
                    <div class="form-group">
                        <label>Email или читательский билет</label>
                        <input type="text" placeholder="ivanov@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" placeholder="••••••" required>
                    </div>
                    <button type="submit" class="auth-btn">Войти</button>
                </form>
            </div>

            <div class="auth-form" id="register-form">
                <form onsubmit="alert('Демо-режим: регистрация не выполнена. Бэкенд в разработке.'); return false;">
                    <div class="form-group">
                        <label>Полное имя</label>
                        <input type="text" placeholder="Иван Иванов" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="ivanov@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" placeholder="не менее 6 символов" required>
                    </div>
                    <div class="form-group">
                        <label>Подтвердите пароль</label>
                        <input type="password" placeholder="••••••" required>
                    </div>
                    <button type="submit" class="auth-btn">Зарегистрироваться</button>
                </form>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>
    <script src="/js/main.js"></script>
</body>
</html>
